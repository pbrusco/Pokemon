name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: TypeScript (noEmit)
        run: npx tsc --noEmit

      - name: TypeScript (unused locals/params)
        run: |
          set -o pipefail
          OUTPUT=$(npx tsc --noEmit --noUnusedLocals --noUnusedParameters 2>&1 || true)
          FILTERED=$(echo "$OUTPUT" | grep -E "error TS(6133|6192|6196|6198)" | grep -v node_modules || true)
          if [ -n "$FILTERED" ]; then
            echo "Unused imports/locals/params detected:"
            echo "$FILTERED"
            exit 1
          fi

      - name: Tests
        run: npm run test:run

      - name: ESLint
        run: npx eslint src/

      - name: Knip (unused exports/deps)
        run: npx knip --no-progress
